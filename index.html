<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --bg-primary: #ffffff;
            --bg-secondary: #f9fafb;
            --bg-tertiary: #f3f4f6;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .player-card {
            background: var(--bg-primary);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .header p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .album-art {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            margin-bottom: 24px;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.2);
        }

        .now-playing {
            text-align: center;
            margin-bottom: 24px;
        }

        .song-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
            word-break: break-word;
            min-height: 24px;
        }

        .song-artist {
            font-size: 13px;
            color: var(--text-secondary);
            min-height: 18px;
        }

        .progress-container {
            margin-bottom: 24px;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .progress-bar input {
            width: 100%;
            height: 4px;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            background: var(--border);
            border-radius: 2px;
        }

        .progress-bar input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
        }

        .progress-bar input::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            border: none;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 32px;
        }

        .control-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            opacity: 0.7;
            transition: all 0.2s ease;
            padding: 8px;
        }

        .control-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .play-btn {
            width: 60px;
            height: 60px;
            background: var(--primary);
            border: none;
            border-radius: 50%;
            font-size: 24px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.3);
        }

        .play-btn:hover {
            transform: scale(1.05);
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        .playlist-section {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .playlist-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .playlist {
            max-height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .playlist::-webkit-scrollbar {
            width: 6px;
        }

        .playlist::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
        }

        .playlist::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .song-item {
            padding: 12px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .song-item:hover {
            background: var(--bg-secondary);
            transform: translateX(4px);
        }

        .song-item.active {
            background: var(--primary);
            color: white;
        }

        .song-name {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="player-card">
            <div class="header">
                <h1>🎵 Music Player</h1>
                <p>Your songs library</p>
            </div>

            <div class="album-art">🎧</div>

            <div class="now-playing">
                <div class="song-title" id="songTitle">Loading...</div>
                <div class="song-artist" id="songArtist">Fetching songs...</div>
            </div>

            <div class="progress-container">
                <div class="time-display">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
                <div class="progress-bar">
                    <input type="range" id="progressSlider" min="0" max="100" value="0">
                </div>
            </div>

            <div class="controls">
                <button class="control-btn" onclick="previousSong()">⏮️</button>
                <button class="play-btn" id="playBtn" onclick="togglePlay()">▶️</button>
                <button class="control-btn" onclick="nextSong()">⏭️</button>
            </div>

            <div class="playlist-section">
                <div class="playlist-title">Playlist</div>
                <div class="playlist" id="playlist">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <div>Loading songs...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" crossorigin="anonymous"></audio>

    <script>
        let songs = [];
        let currentIndex = 0;
        let isPlaying = false;
        let audio = document.getElementById('audioPlayer');

        // Load songs from GitHub API
        async function loadSongs() {
            try {
                // Get your GitHub username and repo name
                const owner = 'Himasopn';
                const repo = 'music';
                const path = 'song';
                const branch = 'main';

                const response = await fetch(
                    `https://api.github.com/repos/${owner}/${repo}/contents/${path}`
                );

                if (!response.ok) {
                    throw new Error('Failed to fetch songs');
                }

                const files = await response.json();

                // Filter audio files
                const audioExtensions = ['.mp3', '.wav', '.ogg', '.m4a', '.flac'];
                songs = files
                    .filter(file => {
                        const name = file.name.toLowerCase();
                        return audioExtensions.some(ext => name.endsWith(ext));
                    })
                    .map(file => ({
                        name: file.name,
                        // Use raw GitHub URL for direct playback
                        path: `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${path}/${file.name}`,
                        duration: 0
                    }))
                    .sort((a, b) => a.name.localeCompare(b.name));

                if (songs.length === 0) {
                    document.getElementById('playlist').innerHTML = 
                        '<div class="loading">No songs found in song folder</div>';
                    return;
                }

                renderPlaylist();
                loadSong(0);
            } catch (error) {
                console.error('Error loading songs:', error);
                document.getElementById('playlist').innerHTML = 
                    '<div class="loading">Make sure you have songs in the "song" folder</div>';
                document.getElementById('songTitle').textContent = 'Error Loading Songs';
                document.getElementById('songArtist').textContent = 'Check console for details';
            }
        }

        function renderPlaylist() {
            const playlistEl = document.getElementById('playlist');
            playlistEl.innerHTML = songs.map((song, index) => `
                <div class="song-item ${index === currentIndex ? 'active' : ''}" onclick="playSong(${index})">
                    <div class="song-name">${song.name.replace(/\.[^.]+$/, '')}</div>
                </div>
            `).join('');
        }

        function loadSong(index) {
            if (songs.length === 0) return;

            currentIndex = index;
            const song = songs[index];

            console.log('Loading song:', song.name, 'URL:', song.path);
            
            audio.src = song.path;
            document.getElementById('songTitle').textContent = song.name.replace(/\.[^.]+$/, '');
            document.getElementById('songArtist').textContent = `${index + 1} of ${songs.length}`;

            updatePlaylistUI();

            audio.onloadedmetadata = () => {
                songs[index].duration = Math.floor(audio.duration);
                updateDuration();
                console.log('Song loaded successfully');
            };

            audio.onerror = (e) => {
                console.error('Error loading song:', song.path, e);
                alert('Error playing: ' + song.name + '\nTrying next song...');
                nextSong();
            };

            audio.oncanplay = () => {
                console.log('Song ready to play');
            };
        }

        function playSong(index) {
            loadSong(index);
            play();
        }

        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (!audio.src) {
                alert('No song loaded');
                return;
            }
            
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.error('Play error:', error);
                    alert('Could not play song. Make sure the URL is accessible.');
                });
            }
            
            isPlaying = true;
            document.getElementById('playBtn').textContent = '⏸️';
        }

        function pause() {
            audio.pause();
            isPlaying = false;
            document.getElementById('playBtn').textContent = '▶️';
        }

        function nextSong() {
            const next = (currentIndex + 1) % songs.length;
            playSong(next);
        }

        function previousSong() {
            const prev = (currentIndex - 1 + songs.length) % songs.length;
            playSong(prev);
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function updateDuration() {
            document.getElementById('duration').textContent = formatTime(audio.duration);
            document.getElementById('progressSlider').max = audio.duration || 100;
        }

        document.getElementById('progressSlider').addEventListener('input', (e) => {
            audio.currentTime = e.target.value;
        });

        audio.addEventListener('timeupdate', () => {
            document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
            document.getElementById('progressSlider').value = audio.currentTime;
        });

        audio.addEventListener('ended', () => {
            nextSong();
        });

        function updatePlaylistUI() {
            document.querySelectorAll('.song-item').forEach((item, index) => {
                item.classList.toggle('active', index === currentIndex);
            });
        }

        // Load songs on page load
        loadSongs();
    </script>
</body>
</html>
