<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --success: #059669;
            --danger: #dc2626;
            --bg-primary: #ffffff;
            --bg-secondary: #f9fafb;
            --bg-tertiary: #f3f4f6;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .player-card {
            background: var(--bg-primary);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            animation: slideInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .header p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .album-art {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            margin-bottom: 24px;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.2);
            animation: fadeIn 0.6s ease 0.2s both;
        }

        .now-playing {
            text-align: center;
            margin-bottom: 24px;
            animation: fadeIn 0.6s ease 0.3s both;
        }

        .song-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
            word-break: break-word;
        }

        .song-artist {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .progress-container {
            margin-bottom: 24px;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-bar input {
            width: 100%;
            height: 100%;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            border-radius: 2px;
        }

        .progress-bar input::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(37, 99, 235, 0.3);
        }

        .progress-bar input::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 6px rgba(37, 99, 235, 0.3);
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 32px;
            animation: slideInUp 0.6s ease 0.4s both;
        }

        .control-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            opacity: 0.7;
            transition: all 0.2s ease;
            padding: 8px;
        }

        .control-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .play-btn {
            width: 60px;
            height: 60px;
            background: var(--primary);
            border: none;
            border-radius: 50%;
            font-size: 24px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.3);
        }

        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        .playlist-section {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .playlist-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .playlist {
            max-height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .playlist::-webkit-scrollbar {
            width: 6px;
        }

        .playlist::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
            border-radius: 3px;
        }

        .playlist::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .playlist::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        .song-item {
            padding: 12px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            animation: slideInUp 0.3s ease;
        }

        .song-item:hover {
            background: var(--bg-secondary);
            border-color: var(--border);
            transform: translateX(4px);
        }

        .song-item.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .song-item.active .song-name,
        .song-item.active .song-time {
            color: white;
        }

        .song-item-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .song-info {
            flex: 1;
            min-width: 0;
        }

        .song-name {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-time {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 480px) {
            .player-card {
                border-radius: 16px;
                padding: 16px;
            }

            .header {
                margin-bottom: 20px;
            }

            .controls {
                gap: 16px;
            }

            .play-btn {
                width: 52px;
                height: 52px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="player-card">
            <div class="header">
                <h1>🎵 Music Player</h1>
                <p>Your songs library</p>
            </div>

            <div class="album-art">🎧</div>

            <div class="now-playing">
                <div class="song-title" id="songTitle">Loading...</div>
                <div class="song-artist" id="songArtist">Please wait</div>
            </div>

            <div class="progress-container">
                <div class="time-display">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
                <div class="progress-bar">
                    <input type="range" id="progressSlider" min="0" max="100" value="0">
                </div>
            </div>

            <div class="controls">
                <button class="control-btn" id="prevBtn" onclick="previousSong()" title="Previous">⏮️</button>
                <button class="play-btn" id="playBtn" onclick="togglePlay()" title="Play/Pause">▶️</button>
                <button class="control-btn" id="nextBtn" onclick="nextSong()" title="Next">⏭️</button>
            </div>

            <div class="playlist-section">
                <div class="playlist-title">Playlist</div>
                <div class="playlist" id="playlist"></div>
            </div>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        // ========== STATE ==========
        let songs = [];
        let currentIndex = 0;
        let isPlaying = false;
        let audio = document.getElementById('audioPlayer');

        // ========== LOAD SONGS ==========
        async function loadSongs() {
            try {
                const response = await fetch('songs/');
                const html = await response.text();
                
                // Parse HTML to extract song files
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const links = Array.from(doc.querySelectorAll('a'));
                
                const audioExtensions = ['.mp3', '.wav', '.ogg', '.m4a', '.flac'];
                songs = links
                    .map(link => {
                        const href = link.getAttribute('href');
                        if (!href || href === '../') return null;
                        
                        const isAudio = audioExtensions.some(ext => href.toLowerCase().endsWith(ext));
                        if (!isAudio) return null;
                        
                        return {
                            name: decodeURIComponent(href),
                            path: 'songs/' + decodeURIComponent(href),
                            duration: 0
                        };
                    })
                    .filter(song => song !== null)
                    .sort((a, b) => a.name.localeCompare(b.name));

                if (songs.length === 0) {
                    document.getElementById('playlist').innerHTML = 
                        '<div class="loading">No songs found in songs folder</div>';
                    return;
                }

                renderPlaylist();
                loadSong(0);
            } catch (error) {
                console.error('Error loading songs:', error);
                document.getElementById('playlist').innerHTML = 
                    '<div class="loading">Create a "songs" folder and add MP3 files</div>';
            }
        }

        // ========== RENDER PLAYLIST ==========
        function renderPlaylist() {
            const playlistEl = document.getElementById('playlist');
            playlistEl.innerHTML = songs.map((song, index) => `
                <div class="song-item ${index === currentIndex ? 'active' : ''}" onclick="playSong(${index})">
                    <div class="song-item-content">
                        <div class="song-info">
                            <div class="song-name">${song.name.replace(/\.[^.]+$/, '')}</div>
                            <div class="song-time" id="time-${index}">0:00</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ========== LOAD SONG ==========
        function loadSong(index) {
            if (songs.length === 0) return;

            currentIndex = index;
            const song = songs[index];

            audio.src = song.path;
            document.getElementById('songTitle').textContent = song.name.replace(/\.[^.]+$/, '');
            document.getElementById('songArtist').textContent = `Song ${index + 1} of ${songs.length}`;

            updatePlaylistUI();

            audio.onloadedmetadata = () => {
                songs[index].duration = Math.floor(audio.duration);
                updateDuration();
                document.getElementById(`time-${index}`).textContent = formatTime(songs[index].duration);
            };

            audio.onerror = () => {
                console.error('Error loading:', song.path);
                nextSong();
            };
        }

        // ========== PLAY SONG ==========
        function playSong(index) {
            loadSong(index);
            play();
        }

        // ========== PLAYBACK CONTROLS ==========
        function togglePlay() {
            if (isPlaying) {
                pause();
            } else {
                play();
            }
        }

        function play() {
            audio.play();
            isPlaying = true;
            document.getElementById('playBtn').textContent = '⏸️';
        }

        function pause() {
            audio.pause();
            isPlaying = false;
            document.getElementById('playBtn').textContent = '▶️';
        }

        function nextSong() {
            const next = (currentIndex + 1) % songs.length;
            playSong(next);
        }

        function previousSong() {
            const prev = (currentIndex - 1 + songs.length) % songs.length;
            playSong(prev);
        }

        // ========== TIME UPDATES ==========
        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function updateDuration() {
            document.getElementById('duration').textContent = formatTime(audio.duration);
            document.getElementById('progressSlider').max = audio.duration || 100;
        }

        // ========== PROGRESS ==========
        document.getElementById('progressSlider').addEventListener('input', (e) => {
            audio.currentTime = e.target.value;
        });

        audio.addEventListener('timeupdate', () => {
            document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
            document.getElementById('progressSlider').value = audio.currentTime;
        });

        audio.addEventListener('ended', () => {
            nextSong();
        });

        // ========== PLAYLIST UI ==========
        function updatePlaylistUI() {
            document.querySelectorAll('.song-item').forEach((item, index) => {
                item.classList.toggle('active', index === currentIndex);
            });
        }

        // ========== INIT ==========
        loadSongs();

        // Auto-play first song when loaded
        document.addEventListener('click', () => {
            if (!isPlaying && songs.length > 0) {
                play();
            }
        }, { once: true });
    </script>
</body>
</html>
